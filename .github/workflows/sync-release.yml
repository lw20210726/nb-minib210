name: Sync Upstream Release
on: workflow_dispatch
env:
  UPSTREAM: jeffcaiz/nb-minib210
  MINE: lw20210726/nb-minib210
jobs:
  sync_tags_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self repo
        uses: actions/checkout@v4

      - name: Install gh cli
        run: |
          sudo apt update
          sudo apt install gh -y
          gh --version

      - name: Login github with PAT
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh auth login --with-token <<< "$GH_TOKEN"
          gh api user -q .login

      - name: Sync all tags from upstream
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM }}
          git fetch upstream --tags
          git push origin --tags
          echo "===== 标签同步完成 ====="

      - name: Copy all releases
        run: |
          mkdir -p assets
          tags=$(gh release list -R ${{ env.UPSTREAM }} --limit 200 --json tagName -q '.[].tagName')
          echo "待迁移版本列表：$tags"
          for tag in $tags; do
            echo "==================== 开始处理 $tag ===================="
            gh release download "$tag" -R ${{ env.UPSTREAM }} -D ./assets --clobber
            title=$(gh release view "$tag" -R ${{ env.UPSTREAM }} --json name -q .name)
            body=$(gh release view "$tag" -R ${{ env.UPSTREAM }} --json body -q .body)
            pre=$(gh release view "$tag" -R ${{ env.UPSTREAM }} --json isPrerelease -q .isPrerelease)
            echo "版本标题：$title"
            ARGS=("$tag" "./assets/*" "-R" "${{ env.MINE }}" "--title" "$title" "--notes" "$body")
            if [ "$pre" = "true" ]; then
              ARGS+=("--prerelease")
            fi
            gh release create "${ARGS[@]}"
            rm -rf ./assets/*
          done
          echo "全部Release迁移完毕"
